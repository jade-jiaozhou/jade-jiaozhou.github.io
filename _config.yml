
# Minimal Mistakes theme
# theme: minimal-mistakes-jekyll
remote_theme: "mmistakes/minimal-mistakes@4.24.0"
minimal_mistakes_skin: "air"

# Site settings
title: "Jade Zhou"
subtitle: "PhD Student in Human Geography"
url: "https://jade-jiaozhou.github.io"

# Masthead image
logo: "/assets/images/avatar.png"

# Favicon
favicon: "/assets/images/favicon.png"

# Author sidebar info
author:
  name: Jade Jiao Zhou
  bio: "PhD Student in Human Geography at the University of Bristol."
  avatar: "/assets/images/avatar.png"
  email: jiao.zhou@bristol.ac.uk
  location: Bristol, UK
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "github.com/jade-jiaozhou"
    - label: "LinkedIn"
      icon: "fab fa-fw fa-linkedin"
      url: "linkedin.com/in/jade-zhou-320a642ba"
    - label: "Google Scholar"
      icon: "fab fa-fw fa-google-scholar"
      url: "https://scholar.google.co.uk/citations?user=DU_bvWQAAAAJ&hl=en"
    - label: "ORCID"
      icon: "fab fa-fw fa-orcid"
      url: "https://orcid.org/0000-0001-5032-7536"

# Site Footer
footer:
  links:
    - label: "Email"
      icon: "fas fa-fw fa-envelope-square"
      url: "mailto:jiao.zhou@bristol.ac.uk"
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/janesmith"
  since: "2026"

# Build settings
markdown: kramdown

# Include/exclude
include:
  - _pages
  - assets/images
exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - .gitignore

# Hide xml feed
atom_feed:
  hide: true

# Plugins
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jekyll-include-cache
  - jekyll-remote-theme

# Defaults
defaults:
  # _posts
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      comments: # true
      share: true
      related: true
